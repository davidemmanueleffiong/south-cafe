<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="South Cafe sets the standard for premium dining, specializing in authentic shawarma, luxury parfaits, and refreshing fruit drinks. Experience the best of Calabar and Uyo with our world-class delivery and modern dining ecosystem.">
    <title>Sign Up | South Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo-container">
                <img src="https://res.cloudinary.com/dhg2oxagk/image/fetch/f_auto,q_auto,w_200/https%3A%2F%2Fdodptt9f4zk9h.cloudfront.net%2Fstores%2F181349%2Fsouthcaf.jpeg" alt="South Cafe" class="logo-img">
                <span class="logo-text">SOUTH CAFE</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="menu.html" class="nav-link">Menu</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Join the Elite</h2>
            <p>Create an account to unlock South Wallet and faster checkout.</p>
        </div>
        <form id="signup-form">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label class="form-label">Location</label>
                <select class="form-input" id="location" required>
                    <option value="" disabled selected>Select your city...</option>
                    <option value="Calabar">Calabar</option>
                    <option value="Uyo">Uyo</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        </form>
        <div class="form-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const location = document.getElementById('location').value;
            // set Auth User
            localStorage.setItem('southcafe_user', name);
            localStorage.setItem('southcafe_location', location);
            // initialize Wallet with 0.00
            if(!localStorage.getItem('southcafe_wallet')) {
                localStorage.setItem('southcafe_wallet', '0');
            }
            // Redirect with welcome flag
            window.location.href = 'index.html?newuser=true';
        });
    </script>

    <a href="https://wa.me/2348028505626" target="_blank" class="floating-whatsapp" style="position: fixed; bottom: 30px; left: 30px; background-color: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 4000; text-decoration: none; transition: 0.3s;">

    </a>

    <div class="modal-overlay" id="product-detail-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9000; align-items:center; justify-content:center;">
        <div class="modal-content" style="background:var(--color-bg-panel); border-radius:12px; max-width:400px; width:95%; overflow:hidden;">
            <div style="position:relative;">
                <img id="detail-img" src="" style="width:100%; height:250px; object-fit:cover;">
                <span onclick="closeProductDetails()" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer;">✕</span>
            </div>
            <div style="padding: 2rem;">
                <h2 id="detail-title" style="color:var(--color-primary); margin-bottom:10px;"></h2>
                <div id="detail-price" style="font-size:1.2rem; font-weight:bold; margin-bottom:15px; color:var(--color-text);"></div>
                <p id="detail-desc" style="color:var(--color-text-muted); line-height:1.6; margin-bottom:20px;"></p>
                <button id="detail-add-btn" class="btn btn-primary btn-block">Add to Cart</button>
            </div>
        </div>
    </div>

</body>

</html>
