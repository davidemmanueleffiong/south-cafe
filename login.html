    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="South Cafe sets the standard for premium dining, specializing in authentic shawarma, luxury parfaits, and refreshing fruit drinks. Experience the best of Calabar and Uyo with our world-class delivery and modern dining ecosystem.">
    <title>Login | South Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo-container">
                <img src="https://res.cloudinary.com/dhg2oxagk/image/fetch/f_auto,q_auto,w_200/https%3A%2F%2Fdodptt9f4zk9h.cloudfront.net%2Fstores%2F181349%2Fsouthcaf.jpeg" alt="South Cafe" class="logo-img">

            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="menu.html" class="nav-link">Menu</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Login to track your orders</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        <div class="form-footer">
            Don't have an account? <a href="signup.html">Create one</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const name = email.split('@')[0];
            localStorage.setItem('southcafe_user', name);
            window.location.href = 'index.html';
        });
    </script>
