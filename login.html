<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="South Cafe sets the standard for premium dining, specializing in authentic shawarma, luxury parfaits, and refreshing fruit drinks. Experience the best of Calabar and Uyo with our world-class delivery and modern dining ecosystem.">
    <title>Login | South Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo-container" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
                <img src="https://res.cloudinary.com/dhg2oxagk/image/fetch/f_auto,q_auto,w_200/https%3A%2F%2Fdodptt9f4zk9h.cloudfront.net%2Fstores%2F181349%2Fsouthcaf.jpeg" alt="South Cafe" style="height:40px; border-radius:50%;">
                <span class="logo-text" style="font-family:'Playfair Display', serif; font-size:1.8rem; font-weight:700; color:var(--color-primary);">SOUTH CAFE</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="menu.html" class="nav-link">Menu</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Login to track your orders</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="password" required placeholder="••••••••">
                <a href="#" onclick="showForgotModal(event)" style="font-size:0.85rem; color:var(--color-primary); display:inline-block; margin-top:5px; text-decoration:none;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        <div class="form-footer">
            Don't have an account? <a href="signup.html">Create one</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const name = email.split('@')[0];
            localStorage.setItem('southcafe_user', name);
            window.location.href = 'index.html';
        });
    </script>

    <a href="https://wa.me/2348028505626" target="_blank" class="floating-whatsapp" style="position: fixed; bottom: 30px; left: 30px; background-color: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 4000; text-decoration: none; transition: 0.3s;">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/></svg>
    </a>

    <div class="modal-overlay" id="product-detail-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9000; align-items:center; justify-content:center;">
        <div class="modal-content" style="background:var(--color-bg-panel); border-radius:12px; max-width:400px; width:95%; overflow:hidden;">
            <div style="position:relative;">
                <img id="detail-img" src="" style="width:100%; height:250px; object-fit:cover;">
                <span onclick="closeProductDetails()" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer;">✕</span>
            </div>
            <div style="padding: 2rem;">
                <h2 id="detail-title" style="color:var(--color-primary); margin-bottom:10px;"></h2>
                <div id="detail-price" style="font-size:1.2rem; font-weight:bold; margin-bottom:15px; color:var(--color-text);"></div>
                <p id="detail-desc" style="color:var(--color-text-muted); line-height:1.6; margin-bottom:20px;"></p>
                <button id="detail-add-btn" class="btn btn-primary btn-block">Add to Cart</button>
            </div>
        </div>
    </div>


    <div class="modal-overlay" id="forgot-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9000; align-items:center; justify-content:center;">
        <div class="modal-content" style="background:var(--color-bg-panel); border-radius:12px; max-width:400px; width:95%; overflow:hidden; padding: 2rem;">
            <h2 style="color:var(--color-primary); margin-bottom:10px;">Reset Password</h2>
            <p style="color:var(--color-text-muted); margin-bottom:20px; font-size:0.9rem;">Enter your email and we will send you a recovery link.</p>
            <input type="email" id="forgot-email" class="form-input" placeholder="you@example.com" style="margin-bottom:15px; width:100%;">
            <button class="btn btn-primary btn-block" onclick="sendResetLink()" style="margin-bottom:10px;">Send Link</button>
            <button class="btn btn-outline btn-block" onclick="document.getElementById('forgot-modal').style.display='none'">Cancel</button>
        </div>
    </div>
    <script>
        function showForgotModal(e) {
            e.preventDefault();
            document.getElementById('forgot-modal').style.display = 'flex';
        }
        function sendResetLink() {
            const email = document.getElementById('forgot-email').value;
            if(!email) return alert("Please enter your email.");
            
            document.getElementById('forgot-modal').style.display = 'none';
            
            const inbox = document.createElement('div');
            inbox.style.cssText = "position:fixed; bottom:20px; right:20px; background:#fff; color:#111; padding:20px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:9999; max-width:300px; border-left:5px solid #25D366;";
            inbox.innerHTML = `
                <div style="font-weight:bold; font-size:0.9rem; color:#666; margin-bottom:5px;">📧 New Mail: ${email}</div>
                <div style="font-weight:bold; font-size:1.1rem; margin-bottom:10px;">Password Reset Request</div>
                <p style="font-size:0.9rem; color:#555; margin-bottom:15px;">Click the secure link below to reset your South Cafe password.</p>
                <button onclick="alert('Password securely reset to default! You may login normally.'); this.parentElement.remove()" style="background:#00a651; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; width:100%;">🔗 Reset Password</button>
                <div style="position:absolute; top:10px; right:15px; cursor:pointer; color:#999;" onclick="this.parentElement.remove()">✕</div>
            `;
            document.body.appendChild(inbox);
        }
    </script>

</body>

</html>
